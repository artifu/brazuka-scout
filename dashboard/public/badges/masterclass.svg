<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark academic background -->
  <circle cx="32" cy="32" r="30" fill="#7C3AED"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#4C1D95" stroke-width="2.5"/>
  <!-- Mortarboard cap top -->
  <rect x="18" y="24" width="28" height="4" rx="1" fill="white"/>
  <!-- Mortarboard cap dome -->
  <rect x="22" y="17" width="20" height="9" rx="2" fill="white"/>
  <!-- Tassel string -->
  <line x1="46" y1="26" x2="50" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="50" cy="36" r="2.5" fill="#FCD34D"/>
  <line x1="49" y1="38" x2="47" y2="43" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="38" x2="50" y2="44" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="51" y1="38" x2="53" y2="43" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diploma scroll -->
  <rect x="14" y="36" width="30" height="18" rx="3" fill="white"/>
  <rect x="14" y="36" width="30" height="4" rx="2" fill="#DDD6FE"/>
  <rect x="14" y="50" width="30" height="4" rx="2" fill="#DDD6FE"/>
  <!-- Diploma lines -->
  <line x1="19" y1="43" x2="39" y2="43" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="47" x2="34" y2="47" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diploma seal -->
  <circle cx="40" cy="46" r="4" fill="#FCD34D"/>
  <circle cx="40" cy="46" r="2.5" fill="#F59E0B"/>
</svg>
