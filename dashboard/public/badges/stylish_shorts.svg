<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Stylish Shorts — flamboyant fashion shorts -->
  <circle cx="32" cy="32" r="30" fill="#0F172A" stroke="#1E293B" stroke-width="2.5"/>

  <!-- Legs -->
  <rect x="18" y="44" width="10" height="14" rx="3" fill="#C4855A"/>
  <rect x="36" y="44" width="10" height="14" rx="3" fill="#C4855A"/>

  <!-- Waistband -->
  <rect x="14" y="22" width="36" height="5" rx="2" fill="#FBBF24"/>

  <!-- Shorts body — loud tropical pattern -->
  <rect x="14" y="26" width="36" height="20" rx="3" fill="#EF4444"/>
  <!-- Center seam -->
  <rect x="30" y="26" width="4" height="20" fill="#DC2626"/>

  <!-- Pattern details — stars and stripes -->
  <circle cx="20" cy="33" r="2.5" fill="#FBBF24"/>
  <circle cx="44" cy="33" r="2.5" fill="#FBBF24"/>
  <circle cx="20" cy="40" r="2" fill="#FDE68A"/>
  <circle cx="44" cy="40" r="2" fill="#FDE68A"/>
  <text x="24" y="37" font-size="6" fill="#FBBF24">★</text>
  <text x="36" y="37" font-size="6" fill="#FBBF24">★</text>
  <text x="24" y="45" font-size="5" fill="#FDE68A">★</text>
  <text x="36" y="45" font-size="5" fill="#FDE68A">★</text>

  <!-- Sparkle above — fashion vibes -->
  <text x="26" y="20" font-size="9" fill="#FBBF24">✨</text>
</svg>
