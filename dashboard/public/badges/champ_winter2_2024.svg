<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Title 2: Champions League style — silver/white on charcoal, big ears -->
  <circle cx="32" cy="32" r="30" fill="#1E293B" stroke="#334155" stroke-width="2.5"/>
  <!-- Round base disc -->
  <ellipse cx="32" cy="52" rx="10" ry="3" fill="#E2E8F0"/>
  <!-- Stem -->
  <rect x="29" y="42" width="6" height="11" fill="#E2E8F0"/>
  <!-- Bowl - shallow wide cup -->
  <path d="M16,34 Q16,44 32,44 Q48,44 48,34 L46,22 L18,22 Z" fill="#E2E8F0"/>
  <!-- Big round "ear" handles — the CL signature -->
  <circle cx="11" cy="32" r="7" fill="none" stroke="#E2E8F0" stroke-width="5"/>
  <circle cx="53" cy="32" r="7" fill="none" stroke="#E2E8F0" stroke-width="5"/>
  <!-- Cover those inner halves -->
  <path d="M16,25 L16,39 Q11,39 11,32 Q11,25 16,25 Z" fill="#1E293B"/>
  <path d="M48,25 L48,39 Q53,39 53,32 Q53,25 48,25 Z" fill="#1E293B"/>
  <!-- Lid dome on top -->
  <ellipse cx="32" cy="22" rx="14" ry="5" fill="#CBD5E1"/>
  <ellipse cx="32" cy="20" rx="8"  ry="4" fill="#E2E8F0"/>
  <!-- Star burst on lid -->
  <circle cx="32" cy="20" r="3" fill="#FBBF24"/>
  <!-- Shine -->
  <line x1="24" y1="26" x2="23" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Label -->
  <rect x="5" y="49" width="54" height="13" rx="3" fill="#000" opacity="0.45"/>
  <text x="32" y="58.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="white" letter-spacing="0.8">2ND TITLE</text>
</svg>
