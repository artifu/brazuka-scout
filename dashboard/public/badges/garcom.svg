<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue: indigo background -->
  <circle cx="32" cy="32" r="30" fill="#3B82F6"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
  <!-- Serving arm (line from bottom-center up to tray) -->
  <line x1="32" y1="54" x2="32" y2="42" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Tray (ellipse) -->
  <ellipse cx="32" cy="40" rx="18" ry="4" fill="white"/>
  <!-- 3 soccer balls on the tray -->
  <circle cx="20" cy="34" r="6" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="6" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="44" cy="34" r="6" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <!-- Ball hex patches -->
  <circle cx="20" cy="34" r="2.5" fill="#1D4ED8"/>
  <circle cx="32" cy="32" r="2.5" fill="#1D4ED8"/>
  <circle cx="44" cy="34" r="2.5" fill="#1D4ED8"/>
  <!-- Label -->
  <rect x="5" y="49" width="54" height="13" rx="3" fill="#000" opacity="0.45"/>
  <text x="32" y="58.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="white" letter-spacing="0.8">GARÇOM</text>
</svg>
