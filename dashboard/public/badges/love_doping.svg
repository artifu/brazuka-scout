<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Love Doping — gothic girlfriend badge -->
  <circle cx="32" cy="32" r="30" fill="#1A0A2E" stroke="#6B21A8" stroke-width="2.5"/>

  <!-- Long black hair left -->
  <path d="M17,18 Q14,30 16,46" fill="none" stroke="#0D0D0D" stroke-width="8" stroke-linecap="round"/>
  <!-- Long black hair right -->
  <path d="M47,18 Q50,30 48,46" fill="none" stroke="#0D0D0D" stroke-width="8" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="32" cy="24" rx="12" ry="13" fill="#D4A8C7"/>

  <!-- Dark hair on top, flat-top with side parts -->
  <path d="M20,20 Q22,10 32,9 Q42,10 44,20 Q38,16 32,16 Q26,16 20,20 Z" fill="#0D0D0D"/>

  <!-- Eyes — heavy dark eyeliner / smoky -->
  <ellipse cx="27" cy="23" rx="3.5" ry="2.5" fill="#1A0A2E"/>
  <ellipse cx="37" cy="23" rx="3.5" ry="2.5" fill="#1A0A2E"/>
  <!-- White sclera -->
  <ellipse cx="27" cy="23" rx="2.2" ry="1.8" fill="white"/>
  <ellipse cx="37" cy="23" rx="2.2" ry="1.8" fill="white"/>
  <!-- Pupils -->
  <circle cx="27" cy="23" r="1.1" fill="#1A0A2E"/>
  <circle cx="37" cy="23" r="1.1" fill="#1A0A2E"/>
  <!-- Eyeliner flick -->
  <path d="M23,22 Q21,20 20,19" fill="none" stroke="#0D0D0D" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M41,22 Q43,20 44,19" fill="none" stroke="#0D0D0D" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Dark lipstick mouth — slight smirk -->
  <path d="M27,30 Q32,33 37,30" fill="#7C0A2A" stroke="#4A0619" stroke-width="0.8"/>

  <!-- Body — black top with fishnet suggestion -->
  <rect x="22" y="35" width="20" height="14" rx="3" fill="#0D0D0D"/>
  <line x1="26" y1="35" x2="26" y2="49" stroke="#1A0A2E" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="35" x2="30" y2="49" stroke="#1A0A2E" stroke-width="1" opacity="0.5"/>
  <line x1="34" y1="35" x2="34" y2="49" stroke="#1A0A2E" stroke-width="1" opacity="0.5"/>
  <line x1="38" y1="35" x2="38" y2="49" stroke="#1A0A2E" stroke-width="1" opacity="0.5"/>

  <!-- Gothic heart — magenta/purple gradient heart -->
  <path d="M29,14 Q29,11 32,13 Q35,11 35,14 Q35,17 32,19 Q29,17 29,14 Z" fill="#C026D3"/>
  <path d="M30,14 Q30,12 32,13.5 Q34,12 34,14 Q34,16.5 32,18 Q30,16.5 30,14 Z" fill="#E879F9"/>

  <!-- Sparkles / magic aura -->
  <text x="10" y="18" font-size="6" fill="#C026D3" opacity="0.8">✦</text>
  <text x="48" y="18" font-size="5" fill="#A855F7" opacity="0.7">✦</text>
  <text x="14" y="50" font-size="4" fill="#C026D3" opacity="0.6">✦</text>
  <text x="48" y="50" font-size="4" fill="#A855F7" opacity="0.6">✦</text>
</svg>
