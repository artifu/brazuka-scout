<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ultimate Hunger — PlayStation controller, square button only -->
  <circle cx="32" cy="32" r="30" fill="#1A1A2E" stroke="#16213E" stroke-width="2.5"/>

  <!-- Controller body -->
  <rect x="8" y="24" width="48" height="24" rx="8" fill="#2D2D44"/>
  <!-- Left grip -->
  <rect x="8" y="38" width="14" height="14" rx="6" fill="#2D2D44"/>
  <!-- Right grip -->
  <rect x="42" y="38" width="14" height="14" rx="6" fill="#2D2D44"/>

  <!-- D-pad (left side) - grayed out -->
  <rect x="15" y="31" width="5" height="12" rx="1" fill="#1F1F35" opacity="0.5"/>
  <rect x="12" y="34" width="11" height="5" rx="1" fill="#1F1F35" opacity="0.5"/>

  <!-- Right buttons — only square is highlighted, others grayed -->
  <!-- Triangle (top) - gray -->
  <polygon points="40,27 43,33 37,33" fill="#1F1F35" opacity="0.4"/>
  <!-- Circle (right) - gray -->
  <circle cx="45" cy="35" r="3" fill="none" stroke="#1F1F35" stroke-width="2" opacity="0.4"/>
  <!-- Cross X (bottom) - gray -->
  <line x1="38" y1="40" x2="42" y2="44" stroke="#1F1F35" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="42" y1="40" x2="38" y2="44" stroke="#1F1F35" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Square (left) - ONLY THIS ONE IS LIT UP, pink/magenta -->
  <rect x="34" y="33" width="6" height="6" rx="1" fill="#E879F9" stroke="#D946EF" stroke-width="0.8"/>
  <!-- Glow around square -->
  <rect x="33" y="32" width="8" height="8" rx="2" fill="none" stroke="#E879F9" stroke-width="1" opacity="0.5"/>

  <!-- Analog sticks - grayed -->
  <circle cx="20" cy="42" r="4" fill="#1F1F35" opacity="0.5"/>
  <circle cx="36" cy="42" r="4" fill="#1F1F35" opacity="0.5"/>

  <!-- "PASS?" text in red above -->
  <text x="22" y="22" font-size="7" fill="#EF4444" font-weight="bold">PASS?</text>

  <!-- X mark over it -->
  <line x1="20" y1="16" x2="44" y2="22" stroke="#EF4444" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="16" x2="20" y2="22" stroke="#EF4444" stroke-width="1.5" opacity="0.7"/>
</svg>
