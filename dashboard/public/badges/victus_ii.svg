<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Victus II — Vasco da Gama crest style -->
  <circle cx="32" cy="32" r="30" fill="#374151" stroke="#1F2937" stroke-width="2.5"/>

  <!-- Shield shape -->
  <path d="M32,8 L50,14 L50,36 Q50,50 32,58 Q14,50 14,36 L14,14 Z" fill="white" stroke="#1F2937" stroke-width="1"/>

  <!-- Black diagonal sash (banda) — top-right to bottom-left -->
  <path d="M32,8 L50,14 L50,26 L14,48 L14,36 Z" fill="#1F2937"/>

  <!-- Cruz de Malta on the sash -->
  <!-- Vertical bar of cross -->
  <rect x="30" y="22" width="4" height="16" rx="0.5" fill="white"/>
  <!-- Horizontal bar of cross -->
  <rect x="24" y="28" width="16" height="4" rx="0.5" fill="white"/>
  <!-- Cross arm flares (Malta cross style) -->
  <polygon points="30,22 32,25 34,22 33,20 31,20" fill="white"/>
  <polygon points="30,38 32,35 34,38 33,40 31,40" fill="white"/>
  <polygon points="24,28 27,30 24,32 22,31 22,29" fill="white"/>
  <polygon points="40,28 37,30 40,32 42,31 42,29" fill="white"/>

  <!-- "VASCO" text on white part -->
  <text x="32" y="52" font-size="5.5" fill="#1F2937" font-weight="900" text-anchor="middle" letter-spacing="1">VASCO</text>

  <!-- Small star at top of shield -->
  <text x="32" y="17" font-size="5" fill="#1F2937" text-anchor="middle">★</text>
</svg>
