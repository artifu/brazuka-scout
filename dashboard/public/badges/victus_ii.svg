<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Victus II: punctured deflated ball — Summer 2024 -->
  <circle cx="32" cy="32" r="30" fill="#374151" stroke="#1F2937" stroke-width="2.5"/>

  <!-- Air escaping from puncture -->
  <g stroke="#BAE6FD" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <path d="M36,16 Q34,12 36,9"/>
    <path d="M40,18 Q42,13 41,10"/>
    <path d="M32,15 Q31,11 33,8"/>
  </g>

  <!-- Deflated ball — saggy oval, flat at bottom -->
  <path d="M14,37 Q14,24 32,22 Q50,24 50,37 Q50,46 32,48 Q14,46 14,37 Z" fill="white"/>

  <!-- Ball hex patches -->
  <ellipse cx="32" cy="34"  rx="6"   ry="5"   fill="#1F2937"/>
  <ellipse cx="20" cy="32"  rx="3.5" ry="4"   fill="#1F2937"/>
  <ellipse cx="44" cy="32"  rx="3.5" ry="4"   fill="#1F2937"/>
  <ellipse cx="28" cy="24"  rx="4"   ry="2.5" fill="#1F2937"/>
  <ellipse cx="36" cy="24"  rx="4"   ry="2.5" fill="#1F2937"/>
  <ellipse cx="24" cy="42"  rx="4"   ry="2"   fill="#1F2937"/>
  <ellipse cx="40" cy="42"  rx="4"   ry="2"   fill="#1F2937"/>

  <!-- Puncture hole (red, angry) -->
  <circle cx="35" cy="21" r="2.5" fill="#EF4444"/>
  <circle cx="35" cy="21" r="1"   fill="#7F1D1D"/>

  <!-- Sad eyes -->
  <circle cx="27" cy="36" r="2"   fill="white"/>
  <circle cx="37" cy="36" r="2"   fill="white"/>
  <circle cx="27" cy="36.5" r="1" fill="#374151"/>
  <circle cx="37" cy="36.5" r="1" fill="#374151"/>

  <!-- Sad mouth -->
  <path d="M27,42 Q32,40 37,42" fill="none" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>

</svg>
