<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Victus II — Vasco da Gama crest (faithful recreation) -->
  <circle cx="32" cy="32" r="30" fill="#2D2D2D" stroke="#111" stroke-width="2"/>

  <!-- Shield outer border (black) -->
  <path d="M14,10 L50,10 L50,42 Q50,56 32,60 Q14,56 14,42 Z" fill="#1A1A1A"/>

  <!-- Shield white fill -->
  <path d="M16,12 L48,12 L48,42 Q48,54 32,58 Q16,54 16,42 Z" fill="white"/>

  <!-- Diagonal black banda — upper-left to lower-right -->
  <path d="M16,12 L48,12 L48,26 L16,48 L16,12 Z" fill="#1A1A1A"/>
  <!-- Lower-right white section already visible from shield fill -->

  <!-- Maltese cross on the black banda, centered around 32,30 -->
  <!-- Cross center -->
  <g transform="translate(32,30)">
    <!-- Vertical bar -->
    <rect x="-2.5" y="-10" width="5" height="20" fill="white"/>
    <!-- Horizontal bar -->
    <rect x="-10" y="-2.5" width="20" height="5" fill="white"/>
    <!-- Flared ends — top -->
    <polygon points="-2.5,-10 0,-13 2.5,-10 1.5,-8 -1.5,-8" fill="white"/>
    <!-- Bottom -->
    <polygon points="-2.5,10 0,13 2.5,10 1.5,8 -1.5,8" fill="white"/>
    <!-- Left -->
    <polygon points="-10,-2.5 -13,0 -10,2.5 -8,1.5 -8,-1.5" fill="white"/>
    <!-- Right -->
    <polygon points="10,-2.5 13,0 10,2.5 8,1.5 8,-1.5" fill="white"/>
  </g>

  <!-- "CR" in the upper-right white area -->
  <text x="41" y="22" font-size="5.5" fill="#1A1A1A" font-weight="900" font-family="serif" text-anchor="middle">CR</text>

  <!-- "VdG" in the lower-left white area -->
  <text x="23" y="48" font-size="4.5" fill="#1A1A1A" font-weight="900" font-family="serif" text-anchor="middle">VdG</text>

  <!-- "VASCO" at very bottom of shield -->
  <text x="32" y="56" font-size="4.5" fill="white" font-weight="900" font-family="sans-serif" text-anchor="middle" letter-spacing="1">VASCO</text>
</svg>
