<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tipo Ronaldo injury badge — R9 fenômeno haircut -->
  <circle cx="32" cy="32" r="30" fill="#7C3AED" stroke="#5B21B6" stroke-width="2.5"/>
  <!-- Head (bald, brown skin) -->
  <ellipse cx="32" cy="26" rx="13" ry="14" fill="#C4855A"/>
  <!-- Famous R9 haircut: triangle patch on front of bald head -->
  <path d="M25,16 Q32,10 39,16 Q35,20 29,20 Z" fill="#1F2937"/>
  <!-- Eyes -->
  <circle cx="27" cy="25" r="2.5" fill="white"/>
  <circle cx="37" cy="25" r="2.5" fill="white"/>
  <circle cx="27.5" cy="25.5" r="1.3" fill="#1F2937"/>
  <circle cx="37.5" cy="25.5" r="1.3" fill="#1F2937"/>
  <!-- Big Ronaldo smile (he's known for it) -->
  <path d="M25,31 Q32,37 39,31" fill="white"/>
  <path d="M25,31 Q32,37 39,31" fill="none" stroke="#1F2937" stroke-width="1" />
  <!-- Body / torso -->
  <rect x="24" y="38" width="16" height="10" rx="3" fill="#3B82F6"/>
  <!-- Clutching knee — bandage on leg -->
  <rect x="26" y="48" width="7" height="10" rx="2" fill="#C4855A"/>
  <rect x="37" y="48" width="7" height="10" rx="2" fill="#C4855A"/>
  <!-- Bandage on left knee -->
  <rect x="24" y="52" width="11" height="5" rx="2" fill="white"/>
  <line x1="29" y1="52" x2="29" y2="57" stroke="#EF4444" stroke-width="1.5"/>
  <line x1="24" y1="54.5" x2="35" y2="54.5" stroke="#EF4444" stroke-width="1.5"/>
</svg>
