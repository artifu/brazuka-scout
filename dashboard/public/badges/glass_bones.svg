<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- X-ray dark background -->
  <circle cx="32" cy="32" r="30" fill="#0F172A"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1E3A5F" stroke-width="2.5"/>

  <!-- Foot X-ray — top-down, toes pointing right -->
  <!-- Heel / tarsal block -->
  <ellipse cx="13" cy="32" rx="8" ry="11" fill="#BFDBFE"/>

  <!-- 5 metatarsals fanning out -->
  <rect x="17" y="42" width="21" height="3.5" rx="1.5" fill="#BFDBFE" transform="rotate(-9 17 44)"/>
  <rect x="17" y="36" width="23" height="3.5" rx="1.5" fill="#BFDBFE" transform="rotate(-4 17 38)"/>
  <rect x="17" y="30" width="24" height="3.5" rx="1.5" fill="#BFDBFE"/>
  <rect x="17" y="24" width="23" height="3.5" rx="1.5" fill="#BFDBFE" transform="rotate(4 17 26)"/>
  <!-- Big toe metatarsal (wider) -->
  <rect x="17" y="17" width="21" height="5" rx="2" fill="#BFDBFE" transform="rotate(9 17 19)"/>

  <!-- Toe phalanges (connected) — pinky to 2nd toe -->
  <ellipse cx="42" cy="47" rx="2.5" ry="1.8" fill="#BFDBFE"/>
  <ellipse cx="43" cy="40" rx="2.5" ry="1.8" fill="#BFDBFE"/>
  <ellipse cx="44" cy="33" rx="3" ry="1.8" fill="#BFDBFE"/>
  <ellipse cx="43" cy="26" rx="2.5" ry="1.8" fill="#BFDBFE"/>

  <!-- Big toe proximal phalange (still attached, cracked end) -->
  <ellipse cx="41" cy="19" rx="3.5" ry="2.2" fill="#BFDBFE"/>

  <!-- BIG TOE TIP — completely snapped off, floating away -->
  <ellipse cx="52" cy="15" rx="3" ry="2" fill="#BFDBFE"/>

  <!-- Crack / gap between big toe tip and base -->
  <line x1="45" y1="18" x2="49" y2="16" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crack glow -->
  <line x1="45" y1="18" x2="49" y2="16" stroke="#FCA5A5" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <!-- Small red impact dots around the break -->
  <circle cx="47" cy="14" r="1" fill="#FCA5A5"/>
  <circle cx="50" cy="19" r="1" fill="#FCA5A5"/>
</svg>
