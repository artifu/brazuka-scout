<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- X-ray dark blue background -->
  <circle cx="32" cy="32" r="30" fill="#0F172A"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1E3A5F" stroke-width="2.5"/>
  <!-- Bone (tibia/femur style) — X-ray white-blue -->
  <!-- Top knob -->
  <ellipse cx="32" cy="12" rx="9" ry="6" fill="#BFDBFE"/>
  <!-- Shaft -->
  <rect x="28" y="16" width="8" height="30" rx="4" fill="#BFDBFE"/>
  <!-- Bottom knob -->
  <ellipse cx="32" cy="52" rx="9" ry="6" fill="#BFDBFE"/>
  <!-- Inner bone cavity (darker centre — realistic) -->
  <rect x="30" y="20" width="4" height="22" rx="2" fill="#1E40AF" opacity="0.4"/>
  <!-- CRACK — jagged fracture through the shaft -->
  <polyline points="25,28 30,32 26,36 31,40 28,44" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crack glow -->
  <polyline points="25,28 30,32 26,36 31,40 28,44" fill="none" stroke="#FCA5A5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
  <!-- Impact stars -->
  <circle cx="20" cy="30" r="1.5" fill="#FCA5A5"/>
  <circle cx="17" cy="36" r="1" fill="#FCA5A5"/>
  <circle cx="21" cy="40" r="1" fill="#FCA5A5"/>
</svg>
