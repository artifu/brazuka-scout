<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Glass Bones — skeleton feet with cracked toe -->
  <circle cx="32" cy="32" r="30" fill="#1C1917" stroke="#0C0A09" stroke-width="2.5"/>

  <!-- Left foot skeleton -->
  <!-- Metatarsals / foot body -->
  <rect x="10" y="30" width="18" height="8" rx="2" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <!-- Ankle bone -->
  <ellipse cx="14" cy="30" rx="4" ry="3" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <!-- Toes left foot -->
  <ellipse cx="26" cy="34" rx="2.5" ry="2" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <ellipse cx="26" cy="30" rx="2" ry="1.8" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <ellipse cx="26" cy="26" rx="1.8" ry="1.6" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <!-- Toe nails hint -->
  <ellipse cx="28" cy="34" rx="1" ry="0.7" fill="#D1D5DB"/>
  <!-- CRACK on big toe (bottom left toe) -->
  <path d="M24,36 L26,33 L28,36" fill="none" stroke="#EF4444" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M26,33 L25,31" fill="none" stroke="#EF4444" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Crack glow -->
  <path d="M24,36 L26,33 L28,36" fill="none" stroke="#FCA5A5" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Right foot skeleton (mirrored) -->
  <rect x="36" y="30" width="18" height="8" rx="2" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <!-- Ankle bone -->
  <ellipse cx="50" cy="30" rx="4" ry="3" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <!-- Toes right foot -->
  <ellipse cx="38" cy="34" rx="2.5" ry="2" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <ellipse cx="38" cy="30" rx="2" ry="1.8" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <ellipse cx="38" cy="26" rx="1.8" ry="1.6" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <!-- Toe nail hint -->
  <ellipse cx="36" cy="34" rx="1" ry="0.7" fill="#D1D5DB"/>

  <!-- Shin bones above -->
  <rect x="13" y="16" width="4" height="15" rx="2" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <rect x="47" y="16" width="4" height="15" rx="2" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>

  <!-- Knee caps -->
  <ellipse cx="15" cy="16" rx="4" ry="3" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>
  <ellipse cx="49" cy="16" rx="4" ry="3" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.6"/>

  <!-- Stars indicating pain -->
  <text x="28" y="46" font-size="8" fill="#FBBF24">★</text>
  <text x="34" y="52" font-size="6" fill="#FCA5A5">✦</text>
  <text x="18" y="52" font-size="6" fill="#FCA5A5">✦</text>
</svg>
