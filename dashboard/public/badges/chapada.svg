<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Chapada — free kick goal -->
  <circle cx="32" cy="32" r="30" fill="#1E3A5F" stroke="#1E40AF" stroke-width="2.5"/>

  <!-- Defensive wall (3 players silhouettes) -->
  <rect x="10" y="38" width="7"  height="14" rx="3" fill="#374151"/>
  <rect x="19" y="36" width="7"  height="16" rx="3" fill="#374151"/>
  <rect x="28" y="38" width="7"  height="14" rx="3" fill="#374151"/>
  <!-- Heads -->
  <circle cx="13.5" cy="36" r="3.5" fill="#374151"/>
  <circle cx="22.5" cy="34" r="3.5" fill="#374151"/>
  <circle cx="31.5" cy="36" r="3.5" fill="#374151"/>

  <!-- Goal (far right) -->
  <rect x="48" y="30" width="2"  height="20" rx="0.5" fill="white"/>
  <rect x="58" y="30" width="2"  height="20" rx="0.5" fill="white"/>
  <rect x="48" y="30" width="12" height="2"  rx="0.5" fill="white"/>
  <!-- Net -->
  <line x1="50" y1="32" x2="58" y2="32" stroke="white" stroke-width="0.4" opacity="0.4"/>
  <line x1="50" y1="38" x2="58" y2="38" stroke="white" stroke-width="0.4" opacity="0.4"/>
  <line x1="50" y1="44" x2="58" y2="44" stroke="white" stroke-width="0.4" opacity="0.4"/>
  <line x1="52" y1="32" x2="52" y2="50" stroke="white" stroke-width="0.4" opacity="0.4"/>
  <line x1="55" y1="32" x2="55" y2="50" stroke="white" stroke-width="0.4" opacity="0.4"/>
  <line x1="58" y1="32" x2="58" y2="50" stroke="white" stroke-width="0.4" opacity="0.4"/>

  <!-- Ball curling over the wall into the goal -->
  <circle cx="53" cy="36" r="5" fill="white" stroke="#374151" stroke-width="0.7"/>
  <path d="M53,31 L50.5,33.5 L51.5,36 L54.5,36 L55.5,33.5 Z" fill="#1F2937"/>
  <path d="M48,34 L50.5,33.5 L51.5,36" fill="none" stroke="#1F2937" stroke-width="0.7"/>

  <!-- Curved trajectory arc over the wall -->
  <path d="M8,50 Q18,10 53,31" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="3,2" stroke-linecap="round"/>

  <!-- Kick spark at start -->
  <circle cx="8" cy="50" r="2.5" fill="#FBBF24" opacity="0.8"/>
  <line x1="5"  y1="47" x2="8"  y2="50" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="5"  y1="53" x2="8"  y2="50" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="2"  y1="50" x2="8"  y2="50" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
