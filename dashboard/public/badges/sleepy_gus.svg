<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sleepy Gus — player asleep on pitch -->
  <circle cx="32" cy="32" r="30" fill="#1E293B" stroke="#0F172A" stroke-width="2.5"/>

  <!-- Grass / pitch line -->
  <rect x="4" y="48" width="56" height="4" rx="1" fill="#166534" opacity="0.6"/>

  <!-- Player lying down — body -->
  <rect x="10" y="42" width="32" height="8" rx="4" fill="#3B82F6"/>

  <!-- Head (on the pitch) -->
  <circle cx="44" cy="44" r="8" fill="#C4855A"/>

  <!-- Closed sleeping eyes -->
  <path d="M40,43 Q42,41 44,43" fill="none" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M44,43 Q46,41 48,43" fill="none" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Content sleeping mouth -->
  <path d="M42,46 Q44,48 46,46" fill="none" stroke="#1F2937" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ZZZ floating up -->
  <text x="44" y="34" font-size="8" fill="#94A3B8" font-weight="bold">Z</text>
  <text x="50" y="26" font-size="10" fill="#94A3B8" font-weight="bold">Z</text>
  <text x="48" y="18" font-size="7" fill="#64748B" font-weight="bold">z</text>

  <!-- Mini pillow under head -->
  <ellipse cx="44" cy="50" rx="9" ry="3" fill="#E2E8F0" opacity="0.5"/>
</svg>
