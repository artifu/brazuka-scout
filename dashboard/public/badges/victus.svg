<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Victus: shame badge — white flag in the rain, gray -->
  <circle cx="32" cy="32" r="30" fill="#4B5563" stroke="#374151" stroke-width="2.5"/>
  <!-- Rain drops (slanted) -->
  <g stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="12" y1="12" x2="9"  y2="20"/>
    <line x1="20" y1="10" x2="17" y2="18"/>
    <line x1="44" y1="10" x2="41" y2="18"/>
    <line x1="52" y1="12" x2="49" y2="20"/>
    <line x1="8"  y1="28" x2="5"  y2="36"/>
    <line x1="56" y1="28" x2="53" y2="36"/>
    <line x1="48" y1="44" x2="45" y2="52"/>
    <line x1="14" y1="44" x2="11" y2="52"/>
  </g>
  <!-- Flagpole -->
  <line x1="24" y1="48" x2="24" y2="16" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- White flag (drooping sadly) -->
  <path d="M24,17 L46,23 L40,32 L24,30 Z" fill="white"/>
  <!-- Flag wrinkle / droop -->
  <path d="M30,18 Q34,26 30,30" fill="none" stroke="#D1D5DB" stroke-width="1" opacity="0.6"/>
  <!-- Scoreboard -->
  <rect x="32" y="38" width="22" height="13" rx="3" fill="#111827"/>
  <text x="43" y="48" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#EF4444">0 W</text>
</svg>
