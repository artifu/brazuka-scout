<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Victus: poop in cleats — Summer 2024 -->
  <circle cx="32" cy="32" r="30" fill="#4B5563" stroke="#374151" stroke-width="2.5"/>

  <!-- Stink lines -->
  <g stroke="#A3E635" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
    <path d="M11,22 Q13,19 11,16"/>
    <path d="M17,16 Q19,13 17,10"/>
    <path d="M47,20 Q45,17 47,14"/>
    <path d="M53,26 Q55,23 53,20"/>
  </g>

  <!-- Poop base (widest, flat bottom) -->
  <rect x="15" y="41" width="34" height="11" rx="5" fill="#7C3B0A"/>

  <!-- Middle bulge -->
  <ellipse cx="32" cy="38" rx="14" ry="9"  fill="#8B4513"/>

  <!-- Upper bulge -->
  <ellipse cx="32" cy="30" rx="11" ry="8"  fill="#9B5015"/>

  <!-- Top dome -->
  <ellipse cx="32" cy="23" rx="8"  ry="7"  fill="#A56120"/>

  <!-- Swirl tip -->
  <ellipse cx="33" cy="17" rx="4.5" ry="5.5" fill="#B8762A" transform="rotate(12 33 17)"/>

  <!-- Shine on swirl -->
  <ellipse cx="31" cy="14" rx="1.5" ry="2" fill="white" opacity="0.25"/>

  <!-- Dumb eyes -->
  <circle cx="27" cy="31" r="3.5" fill="white"/>
  <circle cx="37" cy="31" r="3.5" fill="white"/>
  <circle cx="27.5" cy="32" r="1.8" fill="#1F2937"/>
  <circle cx="37.5" cy="32" r="1.8" fill="#1F2937"/>
  <!-- X pupils (defeated look) -->
  <g stroke="#1F2937" stroke-width="1" stroke-linecap="round">
    <line x1="26" y1="30" x2="28" y2="32"/><line x1="28" y1="30" x2="26" y2="32"/>
    <line x1="36.5" y1="30" x2="38.5" y2="32"/><line x1="38.5" y1="30" x2="36.5" y2="32"/>
  </g>

  <!-- Flat sad mouth -->
  <path d="M27,37 Q32,35 37,37" fill="none" stroke="#5C2800" stroke-width="2" stroke-linecap="round"/>

  <!-- Left cleat -->
  <rect x="16" y="48" width="11" height="7"  rx="2" fill="#111827"/>
  <rect x="14" y="53" width="13" height="3"  rx="1.5" fill="#374151"/>
  <circle cx="17" cy="55" r="1.3" fill="#6B7280"/>
  <circle cx="21" cy="55" r="1.3" fill="#6B7280"/>
  <circle cx="25" cy="55" r="1.3" fill="#6B7280"/>

  <!-- Right cleat -->
  <rect x="37" y="48" width="11" height="7"  rx="2" fill="#111827"/>
  <rect x="37" y="53" width="13" height="3"  rx="1.5" fill="#374151"/>
  <circle cx="39" cy="55" r="1.3" fill="#6B7280"/>
  <circle cx="43" cy="55" r="1.3" fill="#6B7280"/>
  <circle cx="47" cy="55" r="1.3" fill="#6B7280"/>
</svg>
