<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shoot Fofo — fluffy slipper (pantufa) kicking ball -->
  <circle cx="32" cy="32" r="30" fill="#7C3AED" stroke="#5B21B6" stroke-width="2.5"/>

  <!-- Soccer ball -->
  <circle cx="46" cy="44" r="8" fill="white" stroke="#374151" stroke-width="0.8"/>
  <path d="M46,36 L43,39 L44,44 L48,44 L49,40 Z" fill="#1F2937"/>
  <path d="M38,41 L43,39 L44,44" fill="none" stroke="#1F2937" stroke-width="0.8"/>
  <path d="M54,41 L49,40 L48,44" fill="none" stroke="#1F2937" stroke-width="0.8"/>

  <!-- Fluffy slipper body -->
  <!-- Main slipper sole -->
  <ellipse cx="28" cy="46" rx="16" ry="7" fill="#FCE7F3"/>
  <!-- Fluffy top -->
  <ellipse cx="28" cy="41" rx="14" ry="9" fill="#FBCFE8"/>
  <!-- Extra fluffy puffs on top -->
  <circle cx="18" cy="40" r="6" fill="#FBCFE8"/>
  <circle cx="25" cy="37" r="7" fill="#FBCFE8"/>
  <circle cx="33" cy="38" r="6" fill="#FBCFE8"/>
  <circle cx="39" cy="41" r="5" fill="#FBCFE8"/>
  <!-- Sole line -->
  <ellipse cx="28" cy="47" rx="15" ry="4" fill="#F9A8D4"/>

  <!-- Motion lines from kick -->
  <line x1="38" y1="44" x2="44" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="37" y1="46" x2="43" y2="44" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Little stars/sparkles showing softness -->
  <text x="12" y="22" font-size="8" fill="#F0ABFC">✦</text>
  <text x="42" y="20" font-size="6" fill="#E879F9">✦</text>
</svg>
