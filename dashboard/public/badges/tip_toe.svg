<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tip Toe — biquinho / toe poke mastery -->
  <circle cx="32" cy="32" r="30" fill="#0C4A6E" stroke="#075985" stroke-width="2.5"/>

  <!-- Leg coming from upper left -->
  <rect x="8" y="14" width="12" height="28" rx="6" fill="#C4855A" transform="rotate(35 14 28)"/>

  <!-- Boot / cleat -->
  <ellipse cx="26" cy="38" rx="12" ry="7" fill="#1F2937" transform="rotate(35 26 38)"/>
  <ellipse cx="30" cy="35" rx="5" ry="3.5" fill="#374151" transform="rotate(35 30 35)"/>
  <!-- Cleat studs -->
  <circle cx="22" cy="42" r="1.5" fill="#6B7280"/>
  <circle cx="27" cy="44" r="1.5" fill="#6B7280"/>
  <circle cx="32" cy="43" r="1.5" fill="#6B7280"/>

  <!-- Toe tip touching ball -->
  <ellipse cx="34" cy="38" rx="3" ry="2.5" fill="#374151" transform="rotate(35 34 38)"/>

  <!-- Soccer ball -->
  <circle cx="44" cy="42" r="9" fill="white" stroke="#374151" stroke-width="0.8"/>
  <path d="M44,33 L41,36 L42,42 L46,42 L47,37 Z" fill="#1F2937"/>
  <path d="M35,39 L41,36 L42,42" fill="none" stroke="#1F2937" stroke-width="0.8"/>
  <path d="M53,39 L47,37 L46,42" fill="none" stroke="#1F2937" stroke-width="0.8"/>

  <!-- Sparkle — delicate touch -->
  <text x="40" y="24" font-size="10" fill="#BAE6FD">✦</text>
  <text x="50" y="30" font-size="7" fill="#7DD3FC">✦</text>

  <!-- "biquinho" text at bottom -->
  <text x="13" y="58" font-size="6.5" fill="#BAE6FD" font-style="italic">biquinho</text>
</svg>
