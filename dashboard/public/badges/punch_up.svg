<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Deep purple — underdog energy -->
  <circle cx="32" cy="32" r="30" fill="#6D28D9"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#4C1D95" stroke-width="2.5"/>
  <!-- Bold upward arrow (punching above weight) -->
  <line x1="32" y1="50" x2="32" y2="20" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <polyline points="20,32 32,18 44,32" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small figure at bottom (the underdog) -->
  <circle cx="32" cy="56" r="4" fill="#DDD6FE"/>
  <line x1="32" y1="52" x2="32" y2="50" stroke="#DDD6FE" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stars of impact on sides -->
  <circle cx="14" cy="22" r="2.5" fill="#C4B5FD"/>
  <circle cx="50" cy="22" r="2.5" fill="#C4B5FD"/>
  <circle cx="10" cy="30" r="1.5" fill="#C4B5FD"/>
  <circle cx="54" cy="30" r="1.5" fill="#C4B5FD"/>
</svg>
