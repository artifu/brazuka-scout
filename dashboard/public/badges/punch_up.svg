<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Royal blue background -->
  <circle cx="32" cy="32" r="30" fill="#1D4ED8"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1E3A8A" stroke-width="2.5"/>
  <!-- Boot/cleat (large, dominant — the stomp) -->
  <!-- Shin guard upper -->
  <rect x="24" y="10" width="14" height="20" rx="5" fill="white"/>
  <!-- Boot body -->
  <path d="M20 30 L20 42 Q20 48 26 48 L44 48 Q50 48 50 43 Q50 38 44 38 L34 38 L34 30 Z" fill="white"/>
  <!-- Cleat studs on bottom -->
  <circle cx="26" cy="48" r="2" fill="#93C5FD"/>
  <circle cx="32" cy="50" r="2" fill="#93C5FD"/>
  <circle cx="38" cy="48" r="2" fill="#93C5FD"/>
  <circle cx="44" cy="46" r="2" fill="#93C5FD"/>
  <!-- Small squashed enemy below (the C-team) -->
  <ellipse cx="32" cy="56" rx="14" ry="3" fill="#BFDBFE" opacity="0.6"/>
  <!-- Upward arrow on left side (punching up / domination) -->
  <path d="M11 38 L11 20 M11 20 L8 26 M11 20 L14 26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stars above boot (impact) -->
  <path d="M48 14 L49 11 L50 14 L53 14 L51 16 L52 19 L49 17 L46 19 L47 16 L45 14 Z" fill="#93C5FD"/>
</svg>
