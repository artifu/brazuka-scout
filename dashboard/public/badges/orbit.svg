<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Orbit — ball kicked so far NASA can't explain it -->
  <circle cx="32" cy="32" r="30" fill="#020617" stroke="#0F172A" stroke-width="2.5"/>

  <!-- Stars -->
  <circle cx="10" cy="10" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="52" cy="8"  r="0.6" fill="white" opacity="0.7"/>
  <circle cx="58" cy="20" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="8"  cy="40" r="0.5" fill="white" opacity="0.7"/>
  <circle cx="55" cy="50" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="15" cy="55" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="48" cy="58" r="0.6" fill="white" opacity="0.5"/>

  <!-- Earth (small, at bottom left) -->
  <circle cx="16" cy="50" r="8" fill="#1D4ED8"/>
  <path d="M10,48 Q14,44 18,48 Q20,52 16,54 Q12,52 10,48 Z" fill="#16A34A"/>
  <path d="M18,44 Q22,46 20,50" fill="none" stroke="#16A34A" stroke-width="1.5"/>

  <!-- Orbit trajectory arc from Earth heading up-right to space -->
  <path d="M22,44 Q35,20 56,8" fill="none" stroke="#FBBF24" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.8" stroke-linecap="round"/>

  <!-- Soccer ball — way up in space -->
  <circle cx="52" cy="12" r="6" fill="white" stroke="#374151" stroke-width="0.7"/>
  <path d="M52,6 L49,9 L50,13 L54,13 L55,9 Z" fill="#1F2937"/>
  <path d="M46,10 L49,9 L50,13" fill="none" stroke="#1F2937" stroke-width="0.7"/>
  <path d="M58,10 L55,9 L54,13" fill="none" stroke="#1F2937" stroke-width="0.7"/>

  <!-- NASA logo hint / scientist -->
  <text x="6" y="22" font-size="5" fill="#60A5FA" opacity="0.8">NASA</text>
  <text x="6" y="28" font-size="4" fill="#60A5FA" opacity="0.6">???</text>

  <!-- Speed lines from ball -->
  <line x1="46" y1="11" x2="40" y2="15" stroke="white" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="46" y1="14" x2="40" y2="17" stroke="white" stroke-width="0.7" opacity="0.3" stroke-linecap="round"/>
</svg>
