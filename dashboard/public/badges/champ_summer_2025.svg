<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Title 4: Ballon d'Or style — golden sphere on column, perfect season -->
  <circle cx="32" cy="32" r="30" fill="#92400E" stroke="#78350F" stroke-width="2.5"/>
  <!-- Column base tiers -->
  <rect x="20" y="52" width="24" height="4"  rx="2"   fill="#FBBF24"/>
  <rect x="23" y="46" width="18" height="7"  rx="1.5" fill="#F59E0B"/>
  <!-- Column shaft -->
  <rect x="29" y="30" width="6"  height="17" fill="#FBBF24"/>
  <!-- Capital (top of column) -->
  <ellipse cx="32" cy="30" rx="9" ry="3" fill="#F59E0B"/>
  <!-- The golden ball (Ballon d'Or) -->
  <circle cx="32" cy="18" r="13" fill="#FBBF24"/>
  <!-- Ball meridian lines -->
  <path d="M19,18 Q32,10 45,18 Q32,26 19,18 Z" fill="#F59E0B" opacity="0.5"/>
  <ellipse cx="32" cy="18" rx="6" ry="13" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
  <!-- Gold shine highlight -->
  <ellipse cx="28" cy="13" rx="3" ry="4" fill="white" opacity="0.35" transform="rotate(-20 28 13)"/>
  <!-- Star burst around ball -->
  <g stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="32" y1="3"  x2="32" y2="6"/>
    <line x1="42" y1="6"  x2="40" y2="8"/>
    <line x1="46" y1="15" x2="43" y2="16"/>
    <line x1="22" y1="6"  x2="24" y2="8"/>
    <line x1="18" y1="15" x2="21" y2="16"/>
  </g>
  <!-- Label -->
  <rect x="5" y="49" width="54" height="13" rx="3" fill="#000" opacity="0.45"/>
  <text x="32" y="58.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="white" letter-spacing="0.8">4TH TITLE</text>
</svg>
