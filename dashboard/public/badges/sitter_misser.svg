<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sitter Misser — open goal, ball flying wide -->
  <circle cx="32" cy="32" r="30" fill="#DC2626" stroke="#991B1B" stroke-width="2.5"/>

  <!-- Goal posts -->
  <rect x="10" y="28" width="3" height="22" rx="1" fill="white"/>
  <rect x="51" y="28" width="3" height="22" rx="1" fill="white"/>
  <rect x="10" y="28" width="44" height="3" rx="1" fill="white"/>
  <!-- Net lines -->
  <line x1="13" y1="31" x2="13" y2="50" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="23" y1="31" x2="23" y2="50" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="33" y1="31" x2="33" y2="50" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="43" y1="31" x2="43" y2="50" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="13" y1="36" x2="51" y2="36" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="13" y1="43" x2="51" y2="43" stroke="white" stroke-width="0.5" opacity="0.4"/>

  <!-- Ball flying way over the bar + to the right -->
  <circle cx="50" cy="10" r="5" fill="white" stroke="#374151" stroke-width="0.8"/>
  <path d="M50,5 L47,8 L48,11 L52,11 L53,8 Z" fill="#1F2937"/>
  <!-- Ball trajectory arc -->
  <path d="M28,38 Q40,20 50,10" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.6" stroke-linecap="round"/>

  <!-- Player with hands on head -->
  <!-- Head -->
  <circle cx="20" cy="24" r="5" fill="#C4855A"/>
  <!-- Arms up in disbelief -->
  <line x1="20" y1="29" x2="14" y2="22" stroke="#C4855A" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="29" x2="26" y2="22" stroke="#C4855A" stroke-width="3" stroke-linecap="round"/>
  <!-- Hands on head -->
  <circle cx="14" cy="21" r="2.5" fill="#C4855A"/>
  <circle cx="26" cy="21" r="2.5" fill="#C4855A"/>
  <!-- Body -->
  <rect x="16" y="29" width="8" height="8" rx="2" fill="#3B82F6"/>
</svg>
