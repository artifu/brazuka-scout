<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Little Roll — nutmeg in defensive area -->
  <circle cx="32" cy="32" r="30" fill="#1E3A8A" stroke="#1E40AF" stroke-width="2.5"/>

  <!-- Two legs (defender) viewed from front -->
  <!-- Left leg -->
  <rect x="16" y="28" width="10" height="22" rx="5" fill="#C4855A"/>
  <!-- Right leg -->
  <rect x="38" y="28" width="10" height="22" rx="5" fill="#C4855A"/>

  <!-- Gap between legs -->
  <!-- Soccer ball rolling through the gap -->
  <circle cx="32" cy="42" r="7" fill="white" stroke="#374151" stroke-width="0.8"/>
  <path d="M32,35 L29,38 L30,42 L34,42 L35,38 Z" fill="#1F2937"/>
  <path d="M25,39 L29,38 L30,42" fill="none" stroke="#1F2937" stroke-width="0.8"/>
  <path d="M39,39 L35,38 L34,42" fill="none" stroke="#1F2937" stroke-width="0.8"/>

  <!-- Shorts -->
  <rect x="13" y="22" width="38" height="10" rx="3" fill="#2563EB"/>

  <!-- Motion lines behind ball -->
  <line x1="32" y1="20" x2="32" y2="30" stroke="white" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6" stroke-linecap="round"/>

  <!-- Cheeky arrow showing ball path through legs -->
  <path d="M32,14 L32,28" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arr)"/>
  <text x="27" y="16" font-size="7" fill="#FBBF24">nutmeg</text>
</svg>
