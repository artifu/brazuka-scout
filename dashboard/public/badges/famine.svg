<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Famine — PS controller, only square button, white background -->
  <circle cx="32" cy="32" r="30" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2.5"/>

  <!-- Controller body -->
  <rect x="8" y="22" width="48" height="26" rx="9" fill="#1E293B"/>
  <!-- Left grip -->
  <rect x="8" y="36" width="15" height="16" rx="7" fill="#1E293B"/>
  <!-- Right grip -->
  <rect x="41" y="36" width="15" height="16" rx="7" fill="#1E293B"/>

  <!-- D-pad — grayed out -->
  <rect x="15" y="30" width="4" height="12" rx="1" fill="#334155" opacity="0.6"/>
  <rect x="12" y="33" width="10" height="5" rx="1" fill="#334155" opacity="0.6"/>

  <!-- Face buttons — triangle, circle, cross all grayed -->
  <polygon points="40,26 43,32 37,32" fill="#334155" opacity="0.5"/>
  <circle cx="45" cy="34" r="3" fill="none" stroke="#334155" stroke-width="1.8" opacity="0.5"/>
  <line x1="38" y1="39" x2="42" y2="43" stroke="#334155" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="42" y1="39" x2="38" y2="43" stroke="#334155" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Square button — only this one is LIT, hot pink -->
  <rect x="33" y="32" width="7" height="7" rx="1.5" fill="#EC4899"/>
  <!-- Glow ring -->
  <rect x="31.5" y="30.5" width="10" height="10" rx="3" fill="none" stroke="#F472B6" stroke-width="1.5" opacity="0.7"/>

  <!-- Analog sticks -->
  <circle cx="21" cy="42" r="4" fill="#334155" opacity="0.6"/>
  <circle cx="37" cy="42" r="4" fill="#334155" opacity="0.6"/>

  <!-- "PASS?" label with big red X through it -->
  <text x="11" y="21" font-size="6.5" fill="#64748B" font-weight="bold">PASS?</text>
  <line x1="10" y1="15" x2="38" y2="22" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="15" x2="10" y2="22" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
</svg>
