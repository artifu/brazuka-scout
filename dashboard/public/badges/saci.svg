<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Saci — Saci-Pererê, Brazilian folkloric one-legged trickster -->
  <circle cx="32" cy="32" r="30" fill="#166534" stroke="#14532D" stroke-width="2.5"/>

  <!-- Spin/whirlwind effect at base -->
  <path d="M24,58 Q32,54 40,58 Q36,50 32,52 Q28,50 24,58 Z" fill="#15803D" opacity="0.6"/>
  <path d="M22,56 Q32,52 42,56" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- Single leg + foot -->
  <rect x="29" y="46" width="6" height="12" rx="3" fill="#1A0A05"/>
  <ellipse cx="32" cy="58" rx="5" ry="2.5" fill="#1A0A05"/>

  <!-- Body -->
  <rect x="24" y="32" width="16" height="16" rx="4" fill="#1A0A05"/>

  <!-- Left arm with pipe -->
  <line x1="24" y1="36" x2="14" y2="32" stroke="#1A0A05" stroke-width="4" stroke-linecap="round"/>
  <!-- Pipe -->
  <rect x="8" y="30" width="8" height="3" rx="1.5" fill="#92400E"/>
  <ellipse cx="8" cy="31.5" rx="2.5" ry="2.5" fill="#78350F"/>
  <!-- Smoke from pipe -->
  <path d="M6,29 Q4,25 6,22" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M8,28 Q7,24 9,21" fill="none" stroke="#9CA3AF" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Right arm up -->
  <line x1="40" y1="36" x2="50" y2="30" stroke="#1A0A05" stroke-width="4" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="32" cy="26" r="9" fill="#1A0A05"/>

  <!-- Red cap (gorro vermelho) — iconic Saci detail -->
  <ellipse cx="32" cy="19" rx="7" ry="3" fill="#DC2626"/>
  <path d="M25,19 Q32,11 39,19" fill="#DC2626"/>
  <ellipse cx="32" cy="17" rx="5" ry="2" fill="#EF4444"/>

  <!-- Eyes — one eye (mischievous) -->
  <circle cx="28" cy="27" r="2.5" fill="white"/>
  <circle cx="28.5" cy="27.5" r="1.2" fill="#1F2937"/>
  <!-- Winking other eye (or missing) -->
  <path d="M34,26 Q36,25 38,26" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Cheeky grin -->
  <path d="M27,31 Q32,35 37,31" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Magic sparkles (trickster) -->
  <text x="44" y="46" font-size="8" fill="#FBBF24">✦</text>
  <text x="12" y="48" font-size="6" fill="#FBBF24" opacity="0.7">✦</text>
</svg>
