<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue card badge -->
  <circle cx="32" cy="32" r="30" fill="#1F2937" stroke="#111827" stroke-width="2.5"/>
  <!-- Referee arm/hand -->
  <rect x="28" y="38" width="10" height="16" rx="4" fill="#C4855A"/>
  <ellipse cx="33" cy="54" rx="7" ry="4" fill="#C4855A"/>
  <!-- Blue card at angle -->
  <rect x="18" y="10" width="22" height="30" rx="3" fill="#3B82F6" transform="rotate(10 29 25)"/>
  <!-- Card shine -->
  <rect x="20" y="12" width="5" height="26" rx="2" fill="#93C5FD" opacity="0.4" transform="rotate(10 22 25)"/>
  <!-- Timer icon (blue card = timed suspension) -->
  <circle cx="44" cy="44" r="9" fill="#1E3A8A"/>
  <circle cx="44" cy="44" r="7" fill="#1D4ED8"/>
  <line x1="44" y1="40" x2="44" y2="44" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="44" x2="47" y2="46" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
