<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Green pitch background -->
  <circle cx="32" cy="32" r="30" fill="#166534"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#14532D" stroke-width="2.5"/>
  <!-- Pitch grass line -->
  <line x1="4" y1="50" x2="60" y2="50" stroke="#15803D" stroke-width="2"/>
  <!-- Figure in dark uniform — silhouette -->
  <!-- Head -->
  <circle cx="32" cy="18" r="5" fill="#1E293B"/>
  <!-- Torso -->
  <rect x="27" y="23" width="10" height="14" rx="2" fill="#1E293B"/>
  <!-- Left arm: elbow out left, forearm angled up-left -->
  <line x1="27" y1="26" x2="17" y2="28" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
  <line x1="17" y1="28" x2="13" y2="20" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
  <!-- Right arm: elbow out right, forearm angled up-right -->
  <line x1="37" y1="26" x2="47" y2="28" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
  <line x1="47" y1="28" x2="51" y2="20" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="30" y1="37" x2="27" y2="50" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="34" y1="37" x2="37" y2="50" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
</svg>
