name: Post-Game Stats Update

on:
  # Runs every Saturday at 9am Pacific (17:00 UTC) — gives a few days after Tuesday games
  schedule:
    - cron: '0 17 * * 6'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase requests numpy pandas statsmodels

      - name: Run post-game update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 update_after_game.py

      - name: Trigger Vercel redeploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" || true
